global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['192.168.178.22:9100']
        labels:
          instance: 'Desktop'
      - targets: ['node-exporter-nas:9101']
        labels:
          instance: 'NAS'

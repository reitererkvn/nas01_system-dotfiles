services:
  semaphore-db:
    image: postgres:15-alpine
    container_name: semaphore-db
    environment:
      POSTGRES_USER: ${SEMAPHORE_DB_USER:-semaphore}
      POSTGRES_PASSWORD: ${SEMAPHORE_DB_PASS}
      POSTGRES_DB: ${SEMAPHORE_DB_NAME:-semaphore}
    volumes:
      - /opt/containerd/semaphore/db:/var/lib/postgresql/data
    restart: unless-stopped

  semaphore:
    image: semaphoreui/semaphore:latest
    container_name: semaphore
    ports:
      - "13000:3000"
    environment:
      SEMAPHORE_DB_USER: ${SEMAPHORE_DB_USER:-semaphore}
      SEMAPHORE_DB_PASS: ${SEMAPHORE_DB_PASS}
      SEMAPHORE_DB_HOST: semaphore-db
      SEMAPHORE_DB_PORT: "5432"
      SEMAPHORE_DB_DIALECT: postgres
      SEMAPHORE_DB: ${SEMAPHORE_DB_NAME:-semaphore}
      SEMAPHORE_PLAYBOOK_PATH: /home/semaphore/playbooks
      SEMAPHORE_ADMIN_PASSWORD: ${SEMAPHORE_ADMIN_PASS}
      SEMAPHORE_ADMIN_NAME: ${SEMAPHORE_ADMIN_NAME:-Admin}
      SEMAPHORE_ADMIN_EMAIL: ${SEMAPHORE_ADMIN_EMAIL:-admin@example.com}
      SEMAPHORE_ADMIN: ${SEMAPHORE_ADMIN_USER:-admin}
    depends_on:
      - semaphore-db
    volumes:
      - /opt/containerd/semaphore/playbooks:/home/semaphore/playbooks
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "19090:9090"
    volumes:
      - /opt/containerd/prometheus/config:/etc/prometheus
      - /opt/containerd/prometheus/data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - "13001:3000"
    volumes:
      - /opt/containerd/grafana/data:/var/lib/grafana
      - /opt/containerd/grafana/provisioning:/etc/grafana/provisioning
      - /opt/containerd/grafana/dashboards:/etc/grafana/provisioning/dashboards/definitions
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASS}
    restart: unless-stopped

  node-exporter-nas:
    image: prom/node-exporter:latest
    container_name: node-exporter-nas
    ports:
      - "9101:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
